# Fine-tune an instruct LLaMA-3.1 model with TTT modules only — freeze base
# weights to preserve instruction-following alignment while learning the TTT
# fast-weight path. Defaults to: keep `ttt_proj` + `ttt_conv` (all layers where
# they exist) AND `down_proj` on TTT-enabled layers trainable; freeze
# everything else.
# See CHANGELOG.md §2 for design rationale and ablation templates.

model:
  model_path: /path/to/your_instruct_model      # e.g. Meta-Llama-3.1-8B-Instruct
  foundation:
    # LLaMA-3.1-8B has 32 layers (indices 0-31). Trimmed the spurious `36` from
    # llama3_longct.yaml so the configured layer count matches the effective one.
    # For LLaMA-3.1-70B (80 layers) extend to e.g. [0, 10, 20, 30, 40, 50, 60, 70].
    ttt_layers: [0, 6, 12, 18, 24, 30]
    ttt_mode: true
    ttt_proj: true
    ttt_lr: 3
    ttt_chunk: 4096

# Selective parameter freezing (see FreezeArguments in tasks/train_torch.py).
freeze:
  enable: true
  trainable_patterns:
    - "ttt_proj"
    - "ttt_conv"
  trainable_on_ttt_layers:
    - "down_proj"        # only down_proj on layers listed in model.foundation.ttt_layers
  verbose: true

data:
  train_path: /path/to/your_data
  train_size: 20000000000
  dataloader_type: native
  datasets_type: iterable
  data_type: plaintext
  max_seq_len: 65536
  text_keys: content_split
  drop_last: true

train:
  output_dir: /path/to/your_output_dir
  data_parallel_mode: fsdp2
  ulysses_parallel_size: 1
  global_batch_size: 64
  micro_batch_size: 1
  rmpad: false
  use_wandb: true
  max_steps: 5000
  rmpad_with_pos_ids: false
  dyn_bsz_margin: 0
  optimizer: adamw
  # NOTE: TTT-only fine-tuning typically benefits from a higher LR (e.g. 1e-4 ~ 5e-4)
  # because the gradient signal is concentrated on a small subset of params.
  # Tune empirically; left at 5e-6 here to match the full-finetune default.
  lr: 5.0e-6
  lr_warmup_ratio: 0.02
  lr_decay_style: cosine
  lr_decay_ratio: 0.90
  weight_decay: 0.1
  max_grad_norm: 1.0
  enable_mixed_precision: true
  enable_gradient_checkpointing: true
  enable_full_shard: true
  init_device: meta
  ckpt_manager: dcp
  save_steps: 500
  save_hf_weights: true
